# 台灣賓果應用 - Docker Compose 一鍵啟動

version: "3.8"

services:
  # MySQL 資料庫
  mysql:
    image: mysql:8.0-alpine
    container_name: taiwan-bingo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-taiwan_bingo}
      MYSQL_USER: ${DB_USER:-bingo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bingo123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./drizzle/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - taiwan-bingo-network

  # 應用服務
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taiwan-bingo-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${DB_USER:-bingo}:${DB_PASSWORD:-bingo123}@mysql:3306/${DB_NAME:-taiwan_bingo}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      timeout: 10s
      retries: 5
      interval: 30s
    networks:
      - taiwan-bingo-network
    restart: unless-stopped

  # Redis 快取（可選）
  redis:
    image: redis:7-alpine
    container_name: taiwan-bingo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taiwan-bingo-network
    restart: unless-stopped
    profiles:
      - cache

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  taiwan-bingo-network:
    driver: bridge
